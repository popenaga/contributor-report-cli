name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect releasable commit
        id: source
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$HEAD_COMMIT_MESSAGE" == chore:\ release\ * ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        if: steps.source.outputs.should_release == 'true'
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - if: steps.source.outputs.should_release == 'true'
        run: npm ci
      
      - name: Configure git user
        if: steps.source.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        if: steps.source.outputs.should_release == 'true'
        id: bump
        run: echo "version=$(npm run --silent release:bump)" >> "$GITHUB_OUTPUT"

      - name: Commit and push release version
        if: steps.source.outputs.should_release == 'true'
        run: |
          git add package.json package-lock.json README.md
          git commit -m "chore: release ${{ steps.bump.outputs.version }}"
          git push origin HEAD:main

      - name: Publish package
        if: steps.source.outputs.should_release == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.source.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ steps.bump.outputs.version }}" --generate-notes
